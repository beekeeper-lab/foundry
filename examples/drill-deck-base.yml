# Drill_Deck_Base — Flutter mobile app with full software dev team.
# Usage:
#   foundry-cli generate examples/drill-deck-base.yml --library ai-team-library

project:
  name: "Drill_Deck_Base"
  description: "Flutter mobile app — Drill Deck base build"
  slug: drill-deck-base
  output_root: "./generated-projects"

expertise:
  - id: flutter
    order: 10
  - id: dart
    order: 20
  - id: clean-code
    order: 30
  - id: accessibility-compliance
    order: 40
  - id: security
    order: 50

team:
  personas:
    # Core team
    - id: team-lead
      include_agent: true
      include_templates: true
      strictness: standard
    - id: ba
      include_agent: true
      include_templates: true
      strictness: standard
    - id: architect
      include_agent: true
      include_templates: true
      strictness: standard
    - id: developer
      include_agent: true
      include_templates: true
      strictness: standard
    - id: tech-qa
      include_agent: true
      include_templates: true
      strictness: standard
    # Extended — Flutter-relevant specialists
    - id: extended/mobile-developer
      include_agent: true
      include_templates: true
      strictness: standard
    - id: extended/ux-ui-designer
      include_agent: true
      include_templates: true
      strictness: standard
    - id: extended/code-quality-reviewer
      include_agent: true
      include_templates: true
      strictness: standard
    - id: extended/devops-release
      include_agent: true
      include_templates: true
      strictness: standard
    - id: extended/technical-writer
      include_agent: true
      include_templates: true
      strictness: standard

architecture:
  patterns:
    - modular-monolith
  cloud_providers:
    - gcp

hooks:
  posture: hardened
  packs:
    - id: hook-policy
      enabled: true
      mode: enforcing
    - id: pre-commit-lint
      enabled: true
      mode: enforcing
    - id: security-scan
      enabled: true
      mode: enforcing

generation:
  seed_tasks: true
  seed_mode: detailed
  write_manifest: true
  write_diff_report: true
  include_media_skills: true
