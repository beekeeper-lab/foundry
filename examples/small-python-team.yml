# Small Python Team — a lightweight composition for utility libraries or scripts.
# Usage: foundry-cli generate examples/small-python-team.yml --library ai-team-library

project:
  name: "Small Python Team"
  slug: small-python-team
  output_root: "./generated-projects"

expertise:
  - id: python
    order: 10
  - id: clean-code
    order: 20

team:
  # All five core personas are included so the contract graph (BEAN-274)
  # is closed: every consumed artifact-type has a producer on the team.
  # Removing ba or architect will trip the compose-time validator.
  personas:
    - id: team-lead
      include_agent: true
      include_templates: true
      strictness: standard
    - id: ba
      include_agent: true
      include_templates: true
      strictness: standard
    - id: architect
      include_agent: true
      include_templates: true
      strictness: standard
    - id: developer
      include_agent: true
      include_templates: true
      strictness: standard
    - id: tech-qa
      include_agent: true
      include_templates: true
      strictness: standard
    - id: extended/code-quality-reviewer
      include_agent: true
      include_templates: true
      strictness: standard

hooks:
  posture: baseline
  packs:
    - id: hook-policy
      enabled: true
      mode: enforcing

generation:
  seed_tasks: true
  write_manifest: true
  write_diff_report: false
