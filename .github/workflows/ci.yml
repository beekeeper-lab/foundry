name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync Claude Code assets (generate symlinks)
        run: bash scripts/claude-sync.sh

      - name: Install system dependencies for PySide6
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon0 libxcb-cursor0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check foundry_app/

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest
