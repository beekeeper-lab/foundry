name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies for PySide6
        # Retry to ride through transient apt-mirror DNS / network flaps
        # on GitHub-hosted runners (e.g. azure.archive.ubuntu.com outages).
        run: |
          for attempt in 1 2 3; do
            echo "::group::apt attempt ${attempt}"
            if sudo apt-get update && \
               sudo apt-get install -y --no-install-recommends \
                 libegl1 libopengl0 libxkbcommon0 libxcb-cursor0; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "apt failed on attempt ${attempt}, sleeping 30s before retry..."
            sleep 30
          done
          echo "apt failed after 3 attempts" >&2
          exit 1

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check foundry_app/

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest
